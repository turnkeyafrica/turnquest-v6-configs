server:
  port: 1040

spring:
  application:
    name: evolve-authentication-service
  config:
    import: optional:configserver:http://turnquest-configuration-service/config
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  cloud:
    kubernetes:
      enabled: false
      discovery:
        enabled: false
    discovery:
      enabled: false

app:
  keycloak:
    auth-server-url: https://evolve.keycloak.caavagroup.com
    default-realm: geminia
    client-id: ${KEYCLOAK_CLIENT_ID:evolve-auth}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:changeme}
  cors:
    allowed-origins: "*"

