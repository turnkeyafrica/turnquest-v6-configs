spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  mail:
    host: smtp.office365.com
    port: 587
    username: emailHere
    password: "passwordHere"
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          starttls:
            enable: true
        debug: true
  security:
    oauth2:
      resource:
        id: geminia
        token-uri: https://evolve.keycloak-staging.caavagroup.com/realms/geminia/protocol/openid-connect/token
        authorization-uri: https://evolve.keycloak-staging.caavagroup.com/realms/geminia/protocol/openid-connect/auth
        userinfo-uri: https://evolve.keycloak-staging.caavagroup.com/realms/geminia/protocol/openid-connect/userinfo
        token-info-uri: https://evolve.keycloak-staging.caavagroup.com/realms/geminia/protocol/openid-connect/token/introspect
        user-info-uri: https://evolve.keycloak-staging.caavagroup.com/realms/geminia/protocol/openid-connect/userinfo
      resourceserver:
        jwt:
          issuer-uri: https://evolve.keycloak-staging.caavagroup.com/realms/geminia
          jwk-set-uri: https://evolve.keycloak-staging.caavagroup.com/realms/geminia/protocol/openid-connect/certs
  cloud:
    config:
      import-check:
        enabled: false
      server:
        git:
          uri: https://github.com/turnkeyafrica/turnquest-v6
          searchPaths: gis-setups-configs
    kubernetes:
      discovery:
        enabled: false  
  mvc:
    format:
      date: yyyy-MM-dd
  servlet:
    multipart:
      max-file-size: 10MB
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 60000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
  jpa:
    hibernate:
      naming-strategy: org.hibernate.cfg.ImprovedNamingStrategy
      ddl-auto: none 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        order_by:
          default_null_ordering: last
      generate-ddl: true
      show-sql: true
  sql:
    init:
      mode: always
  zipkin:
    enabled: false
  application:
    name: fms-payment-service
    jackson:
      serialization:
        FAIL_ON_EMPTY_BEANS: false

server:
  forward-headers-strategy: framework
  port: 2002 
  error:
    include-message: always
  servlet:
    context-path: /
tq:
  dateTimeFormat: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
management:
  endpoints:
    web:
      exposure:
        include: [ "health", "info", "metrics", "prometheus", "bindings", "beans", "env", "loggers", "streamsbindings", "mappings","flyway" ]
app:
  auth:
    server:
      realm-url: ${KEYCLOAK_URL:https://evolve.keycloak-staging.caavagroup.com/realms/geminia}
      jwk-set-uri: ${KEYCLOAK_URL:https://evolve.keycloak-staging.caavagroup.com/realms/geminia}/protocol/openid-connect/certs
  rolesClaim: roles
  # cors:
  #   allowed-origins: "http://localhost:2003,http://localhost:4200,http://192.0.0.169,https://evolve.dev.caavagroup.com"
  locale:
    languages: "en, fr, sw"
    baseName: i18n/messages
    defaultLang: en
  base_url: api/v1
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
logging:
  level:
    com.turnkey.turnquest.feigns.*: DEBUG
    com.turnkey.turnquest.service.*: DEBUG
multitenancy:
  defaultTenant: turnquest
  include: turnquest
  tenants:
    turnquest:
      datasource:
        url: jdbc:oracle:thin:@//190.0.2.231:1521/evolve_staging
        username: TQ_FMS
        password: FMS_2026
        driver-class-name: oracle.jdbc.OracleDriver


#redis:
#  cache:
#    type: redis
#  data:
#    redis:
#      host: ${SPRING_REDIS_HOST:redis.service.consul}
#      port: ${SPRING_REDIS_PORT:6379}
turnquest:
  clients:
    # CRM Services (Mapped to Gateway Route: /crm/setups)
    crm-setups-service: https://evolve.api.staging.caavagroup.com/crm/setups
    crm-accounts-service: https://evolve.api.staging.caavagroup.com/crm/accounts
    crm-user-administration-service: https://evolve.api.staging.caavagroup.com/user/administration

    # FMS Services (Mapped to Gateway Route: /fms/setups)
    fms-setups-service: https://evolve.api.staging.caavagroup.com/fms/setups
    fms-receipting-service: https://evolve.api.staging.caavagroup.com/fms/receipting
    fms-payment-service: https://evolve.api.staging.caavagroup.com/fms/payment
    fms-general-ledger-service: https://evolve.api.staging.caavagroup.com/fms/general-ledger
    fms-cash-book-transactions-service: https://evolve.api.staging.caavagroup.com/fms/cash-book-transactions
    fms-fixed-assets-service: https://evolve.api.staging.caavagroup.com/fms/fixed-assets
    evolve-alfresco-service: https://evolve.api.staging.caavagroup.com/alfresco
    
report-fetching:
  retry:
    max-attempts: 5
    initial-backoff-ms: 1000
    max-backoff-ms: 10000
